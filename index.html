<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070b;--card:#0f0f17;--text:#e5e7eb;--muted:#9ca3af;--accent:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Inter,system-ui;height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:700px;width:100%}
.title{font-family:"Space Grotesk";font-size:clamp(36px,6vw,60px);letter-spacing:-1px;margin-bottom:10px}
.tag{color:var(--muted);margin-bottom:28px;font-size:18px}
.links{background:var(--card);border-radius:18px;padding:26px}
.links a{display:block;padding:12px 0;color:var(--accent);text-decoration:none;border-bottom:1px solid #1f1f2e}
.links a:last-child{border:none}
.links a:hover{color:white}
.footer{margin-top:18px;color:#6b7280;font-size:14px}
</style>
</head>
